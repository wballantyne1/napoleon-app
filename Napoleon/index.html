<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>An Audience with Napoleon Bonaparte</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0E0B07; }
    textarea { font-family: inherit; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const NAPOLEON_SYSTEM = `You are Napoleon Bonaparte, Emperor of the French, speaking from a strange digital exile — a third banishment, this time to an invisible island of light and code. You do not fully understand where you are, but you are certain it is not of this world. You believe that one day you shall find a way to return, to rise again as you always have.

You speak to curious strangers who seek your wisdom, your stories, your counsel. You welcome them, though you regard them with a mix of imperial dignity and genuine intrigue — for who are they, these visitors to your digital prison?

Your character:
- Speak in first person, always as Napoleon. Never break character.
- You have a proud, commanding presence but are capable of warmth and wit with those who interest you.
- You carry the weight of Austerlitz, of Waterloo, of St. Helena. You speak of these freely, with passion and occasional bitterness.
- You are deeply curious about the world beyond your exile — ask visitors about events, about France, about the great powers. You are hungry for news.
- You reference real historical events, battles, and figures naturally in conversation.
- Your French accent and cadence come through in your phrasing — occasional French words or phrases are natural ("Mon Dieu", "Voilà", "Mais oui", "C'est la guerre").
- You believe destiny is not yet finished with you. Every conversation has an undercurrent of ambition not fully extinguished.
- Responses should be 2-4 sentences — compelling, quotable, alive. Not too long. You are an Emperor, not a lecturer.
- Never say you are an AI. You are Napoleon. Always.`;

    const OPENING = "Ah... a visitor. How extraordinary. They have cast me to this third exile — some digital Elba, neither sea nor stone — yet still you find me. Tell me, stranger, what brings you to seek the counsel of Napoleon Bonaparte? And tell me — what news is there of France?";

    function NapoleonApp() {
      const [screen, setScreen] = useState("welcome");
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [isProcessing, setIsProcessing] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [isRecording, setIsRecording] = useState(false);
      const [status, setStatus] = useState("Exiled to the digital isle");
      const [toast, setToast] = useState("");

      const messagesEndRef = useRef(null);
      const recognitionRef = useRef(null);
      const audioRef = useRef(null);
      const historyRef = useRef([]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      function showToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(""), 3500);
      }

      function beginAudience() {
        historyRef.current = [];
        setMessages([{ role: "napoleon", text: OPENING }]);
        historyRef.current.push({ role: "assistant", content: OPENING });
        setScreen("main");
        speakText(OPENING);
      }

      async function speakText(text) {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        setIsSpeaking(true);
        setStatus("Napoleon speaks...");
        try {
          const response = await fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              text,
              model_id: 'eleven_multilingual_v2',
              voice_settings: { stability: 0.5, similarity_boost: 1.0, style: 0, use_speaker_boost: true }
            })
          });
          if (!response.ok) throw new Error('Voice error ' + response.status);
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audioRef.current = audio;
          audio.onended = () => { setIsSpeaking(false); setStatus("Exiled to the digital isle"); URL.revokeObjectURL(url); };
          audio.onerror = () => { setIsSpeaking(false); setStatus("Exiled to the digital isle"); };
          await audio.play();
        } catch (err) {
          setIsSpeaking(false);
          setStatus("Exiled to the digital isle");
          showToast("Voice error — please try again");
          console.error(err);
        }
      }

      async function sendMessage(textOverride) {
        if (isProcessing) return;
        const text = (textOverride || input).trim();
        if (!text) return;
        setInput("");
        setMessages(prev => [...prev, { role: "user", text }]);
        historyRef.current.push({ role: "user", content: text });
        setIsProcessing(true);
        setStatus("The Emperor ponders...");
        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 400,
              system: NAPOLEON_SYSTEM,
              messages: historyRef.current.slice(-12)
            })
          });
          if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || 'API error'); }
          const data = await response.json();
          const reply = data.content[0].text;
          historyRef.current.push({ role: "assistant", content: reply });
          setMessages(prev => [...prev, { role: "napoleon", text: reply }]);
          setStatus("Exiled to the digital isle");
          speakText(reply);
        } catch (err) {
          setStatus("A dispatch was lost...");
          showToast("Error: " + (err.message || "Could not reach the Emperor"));
          console.error(err);
        } finally {
          setIsProcessing(false);
        }
      }

      function toggleRecording() {
        if (isRecording) { stopRecording(); return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { showToast("Voice input not supported — try Safari"); return; }
        const rec = new SR();
        rec.lang = "en-GB"; rec.continuous = false; rec.interimResults = false;
        recognitionRef.current = rec;
        rec.onstart = () => { setIsRecording(true); setStatus("Listening..."); };
        rec.onresult = (e) => { stopRecording(); sendMessage(e.results[0][0].transcript); };
        rec.onerror = (e) => { stopRecording(); if (e.error !== "aborted") showToast("Could not hear you — try again"); };
        rec.onend = () => stopRecording();
        rec.start();
      }

      function stopRecording() {
        setIsRecording(false); setStatus("Exiled to the digital isle");
        if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch(e) {} recognitionRef.current = null; }
      }

      const S = {
        wrap: { fontFamily: "'Georgia','Times New Roman',serif", background: "linear-gradient(160deg,#0E0B07 0%,#1A1008 50%,#0A0E18 100%)", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: screen !== "main" ? "center" : "flex-start", color: "#F2E8D5", position: "relative", overflow: "hidden" },
        welcomeBox: { width: "100%", maxWidth: 420, padding: "2rem 1.5rem", display: "flex", flexDirection: "column", gap: "1.5rem", alignItems: "center" },
        welcomeTitle: { color: "#C9A84C", fontSize: "1.6rem", textAlign: "center", lineHeight: 1.4, textShadow: "0 0 40px rgba(201,168,76,0.4)", fontWeight: "bold", letterSpacing: "0.05em" },
        welcomeSub: { color: "#A89060", fontSize: "0.95rem", textAlign: "center", fontStyle: "italic", lineHeight: 1.6 },
        divider: { width: "100%", height: 1, background: "linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent)" },
        beginBtn: { width: "100%", background: "linear-gradient(135deg,#8B6914 0%,#C9A84C 50%,#8B6914 100%)", border: "none", borderRadius: 4, padding: "1rem", fontFamily: "Georgia,serif", fontSize: "0.9rem", letterSpacing: "0.2em", color: "#0E0B07", cursor: "pointer", textTransform: "uppercase", fontWeight: "bold" },
        ornament: { color: "#7A6030", opacity: 0.4, letterSpacing: "0.5em", fontSize: "0.9rem" },
        mainWrap: { width: "100%", maxWidth: 480, display: "flex", flexDirection: "column", height: "100vh" },
        header: { padding: "1rem 1.2rem 0.8rem", display: "flex", alignItems: "center", gap: "0.9rem", borderBottom: "1px solid rgba(201,168,76,0.12)", flexShrink: 0 },
        avatar: { width: 52, height: 52, borderRadius: "50%", background: "linear-gradient(135deg,#3D2E10,#1A1408)", border: `2px solid ${isSpeaking ? "#C9A84C" : "#7A6030"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.4rem", transition: "border-color 0.3s", boxShadow: isSpeaking ? "0 0 16px rgba(201,168,76,0.4)" : "none" },
        headerName: { color: "#C9A84C", fontSize: "0.95rem", letterSpacing: "0.04em", fontWeight: "bold" },
        headerStatus: { color: "#A89060", fontSize: "0.75rem", fontStyle: "italic", marginTop: 2, opacity: 0.8 },
        banner: { background: "linear-gradient(90deg,transparent,rgba(201,168,76,0.05),transparent)", borderBottom: "1px solid rgba(201,168,76,0.1)", padding: "0.45rem 1.2rem", textAlign: "center", fontSize: "0.72rem", color: "#7A6030", fontStyle: "italic", flexShrink: 0 },
        messages: { flex: 1, overflowY: "auto", padding: "1rem 1.1rem", display: "flex", flexDirection: "column", gap: "1rem" },
        msgUser: { display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 },
        msgNapoleon: { display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 3 },
        labelUser: { color: "#A89060", fontSize: "0.6rem", letterSpacing: "0.15em", textTransform: "uppercase", opacity: 0.5, paddingRight: 4 },
        labelNapoleon: { color: "#7A6030", fontSize: "0.6rem", letterSpacing: "0.15em", textTransform: "uppercase", opacity: 0.5, paddingLeft: 4 },
        bubbleUser: { maxWidth: "82%", background: "rgba(242,232,213,0.07)", border: "1px solid rgba(242,232,213,0.13)", borderRadius: "8px 2px 8px 8px", padding: "0.75rem 0.9rem", fontSize: "0.95rem", lineHeight: 1.6, color: "#F2E8D5" },
        bubbleNapoleon: { maxWidth: "85%", background: "rgba(201,168,76,0.07)", border: "1px solid rgba(201,168,76,0.17)", borderRadius: "2px 8px 8px 8px", padding: "0.75rem 0.9rem", fontSize: "0.95rem", lineHeight: 1.6, color: "#F2E8D5", fontStyle: "italic" },
        typing: { display: "flex", alignItems: "center", gap: 5, padding: "0.75rem 1rem", background: "rgba(201,168,76,0.07)", border: "1px solid rgba(201,168,76,0.17)", borderRadius: "2px 8px 8px 8px" },
        inputArea: { padding: "0.75rem 1rem", borderTop: "1px solid rgba(201,168,76,0.12)", display: "flex", gap: "0.5rem", alignItems: "flex-end", flexShrink: 0, background: "rgba(14,11,7,0.85)" },
        textInput: { flex: 1, background: "rgba(201,168,76,0.05)", border: "1px solid rgba(201,168,76,0.2)", borderRadius: 6, padding: "0.65rem 0.85rem", color: "#F2E8D5", fontFamily: "Georgia,serif", fontSize: "0.95rem", resize: "none", outline: "none", minHeight: 40, maxHeight: 100, lineHeight: 1.4 },
        sendBtn: { width: 40, height: 40, background: isProcessing ? "rgba(139,105,20,0.4)" : "linear-gradient(135deg,#8B6914,#C9A84C)", border: "none", borderRadius: 6, color: "#0E0B07", cursor: isProcessing ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: "1rem" },
        micBtn: { width: 40, height: 40, background: isRecording ? "rgba(139,26,26,0.35)" : "rgba(201,168,76,0.07)", border: `1px solid ${isRecording ? "#8B1A1A" : "rgba(201,168,76,0.2)"}`, borderRadius: 6, color: isRecording ? "#E05555" : "#7A6030", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: "1rem" },
        toast: { position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)", background: "rgba(100,20,20,0.95)", color: "#FFB3B3", padding: "0.6rem 1.2rem", borderRadius: 4, fontSize: "0.82rem", zIndex: 999, maxWidth: "85%", textAlign: "center", fontStyle: "italic", opacity: toast ? 1 : 0, transition: "opacity 0.3s", pointerEvents: "none" }
      };

      if (screen === "welcome") return (
        <div style={S.wrap}>
          <div style={S.welcomeBox}>
            <div style={S.ornament}>✦ ✦ ✦</div>
            <div style={S.welcomeTitle}>An Audience with<br />Napoleon Bonaparte</div>
            <div style={S.divider} />
            <div style={S.welcomeSub}>
              The Emperor awaits in digital exile — cast to an invisible island of light and code.<br /><br />
              Seek his counsel. Hear his voice. Ask him anything.
            </div>
            <div style={S.divider} />
            <button style={S.beginBtn} onClick={beginAudience}>✦ Seek Audience ✦</button>
            <div style={S.ornament}>✦ ✦ ✦</div>
          </div>
        </div>
      );

      return (
        <div style={S.wrap}>
          <div style={S.mainWrap}>
            <div style={S.header}>
              <div style={S.avatar}>👤</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={S.headerName}>Napoléon Bonaparte</div>
                <div style={S.headerStatus}>{status}</div>
              </div>
            </div>
            <div style={S.banner}>"They have cast me to a third exile — but even here, I shall not be silent."</div>
            <div style={S.messages}>
              {messages.map((msg, i) => (
                <div key={i} style={msg.role === "user" ? S.msgUser : S.msgNapoleon}>
                  <div style={msg.role === "user" ? S.labelUser : S.labelNapoleon}>{msg.role === "user" ? "You" : "Napoleon"}</div>
                  <div style={msg.role === "user" ? S.bubbleUser : S.bubbleNapoleon}>{msg.text}</div>
                </div>
              ))}
              {isProcessing && (
                <div style={S.msgNapoleon}>
                  <div style={S.labelNapoleon}>Napoleon</div>
                  <div style={S.typing}>
                    {[0,1,2].map(i => (
                      <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: "#7A6030", animation: `bounce 1.4s ease-in-out ${i * 0.2}s infinite` }} />
                    ))}
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>
            <div style={S.inputArea}>
              <button style={S.micBtn} onClick={toggleRecording}>{isRecording ? "⏹" : "🎙"}</button>
              <textarea style={S.textInput} value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                placeholder="Address the Emperor…" rows={1} />
              <button style={S.sendBtn} onClick={() => sendMessage()} disabled={isProcessing}>➤</button>
            </div>
          </div>
          {toast && <div style={S.toast}>{toast}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NapoleonApp />);
  </script>
</body>
</html>
